name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Sync CLI dev environment
        run: uv sync --package evalflow --extra dev

      - name: Run tests
        working-directory: packages/cli
        run: uv run pytest --basetemp=../../.pytest-tmp -q

      - name: Smoke init and doctor
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ci-smoke | Out-Null
          Push-Location ci-smoke
          try {
            $evalflow = if ($IsWindows) { "..\.venv\Scripts\evalflow.exe" } else { "../.venv/bin/evalflow" }
            & $evalflow init --non-interactive
            & $evalflow doctor --no-provider-check
          } finally {
            Pop-Location
          }
